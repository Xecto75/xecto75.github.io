<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avario Apps</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Avario</h1>
    <p>Indie mobile apps</p>
  </header>

  <main>
    <section class="apps-grid">

      <div class="app-card">
        <img src="/images/gloopyEscape_icon.png" alt="Gloopy Escape icon" />
        <h2>Gloopy Escape</h2>
        <p>Arcade survival game. Dodge obstacles and last as long as you can.</p>
        <a href="/gloopy-ascend/privacy.html">Privacy Policy</a>
      </div>

      <div class="app-card">
        <img src="/images/memori_icon.png" alt="Memori icon" />
        <h2>Memori</h2>
        <p>Train your memory with fun and challenging patterns.</p>
        <a href="#">Privacy Policy</a>
      </div>

      <div class="app-card">
        <img src="/images/screenStamina_icon.png" alt="Screen Stamina icon" />
        <h2>Screen Stamina</h2>
        <p>Track and improve your screen time habits.</p>
        <a href="#">Privacy Policy</a>
      </div>

    </section>
  </main>

  <footer>
    <p>© 2026 Xecto75</p>
  </footer>
</body>
</html>
